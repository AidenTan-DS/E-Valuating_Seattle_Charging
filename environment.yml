name: ev_env
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.14

  # Install these with conda 
  - geopandas
  - pyproj
  - proj
  - shapely

  # Then install other packages via pip
  - pip
  - pip:
      - streamlit>=1.28.0
      - pandas>=2.0.0
      - numpy>=1.24.0
      - plotly>=5.17.0
      - openpyxl>=3.1.0
      - scikit-learn>=1.3.0
      - pytest>=7.0.0
      - pytest-cov>=4.0.0