name: Code Quality & Security

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      
      - name: 1. Code Formatting (Black)
        run: |
          black --check --line-length=100 interactive_map/
        continue-on-error: true
      
      - name: 2. Linting (Pylint)
        run: |
          pylint interactive_map/app_v2.py --fail-under=8.0
      
      - name: 3. Run Tests (Pytest)
        run: |
          pytest tests/ -v --cov=interactive_map --cov-report=term
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false
      
      - name: 4. Security Scan (Bandit)
        run: |
          bandit -r interactive_map/
        continue-on-error: true
      
      - name: 5. Dependency Vulnerabilities (Safety)
        run: |
          safety check
        continue-on-error: true