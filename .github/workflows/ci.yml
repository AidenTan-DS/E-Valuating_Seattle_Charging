name: Code Quality & Security

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pylint black pytest pytest-cov bandit safety
      
      - name: 1. Code Formatting (Black)
        run: |
          black --check --line-length=100 interactive_map/
        continue-on-error: true
      
      - name: 2. Linting (Pylint)
        run: |
        pylint interactive_map/app_v2.py --fail-under=8.0 --output-format=text | tee pylint.txt
        score=$(sed -n 's/^Your code has been rated at \([-0-9.]*\)\/.*/\1/p' pylint.txt)
        echo "PYLINT_SCORE=$score" >> $GITHUB_ENV 
      
      - name: Create Pylint Badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: YOUR_GIST_ID
          filename: pylint-badge.json
          label: Pylint
          message: ${{ env.PYLINT_SCORE }}
          valColorRange: ${{ env.PYLINT_SCORE }}
          maxColorRange: 10
          minColorRange: 0
      
      - name: 3. Run Tests (Pytest)
        run: |
          pytest tests/ -v --cov=interactive_map --cov-report=term
        continue-on-error: true
      
      - name: 4. Security Scan (Bandit)
        run: |
          bandit -r interactive_map/
        continue-on-error: true
      
      - name: 5. Dependency Vulnerabilities (Safety)
        run: |
          safety check
        continue-on-error: true